<!DOCTYPE html>
<html>
<head>
    <title>AutoCita Dashboard</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 40px; border-radius: 8px; }
        h1 { color: #0052CC; }
        .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin: 30px 0; }
        .kpi { background: #f0f0f0; padding: 20px; border-radius: 8px; text-align: center; }
        .kpi-value { font-size: 32px; font-weight: bold; color: #0052CC; }
        nav { margin-bottom: 30px; border-bottom: 2px solid #0052CC; padding-bottom: 10px; }
        nav button { background: #0052CC; color: white; border: none; padding: 10px 20px; border-radius: 4px; margin-right: 10px; cursor: pointer; }
        nav button:hover { background: #003B99; }
        section { display: none; }
        section.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f0f0f0; font-weight: bold; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .btn { background: #0052CC; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        .btn:hover { background: #003B99; }
        .alert { padding: 15px; margin-bottom: 20px; border-radius: 4px; }
        .alert-success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 AutoCita Dashboard</h1>
        
        <nav>
            <button onclick="showSection('dashboard')">Dashboard</button>
            <button onclick="showSection('pacientes')">Pacientes</button>
            <button onclick="showSection('citas')">Citas</button>
            <button onclick="showSection('reportes')">Reportes</button>
            <button onclick="logout()" style="float: right; background: #EF4444;">Cerrar Sesión</button>
        </nav>

        <section id="dashboard" class="active">
            <h2>Dashboard</h2>
            <div class="kpis">
                <div class="kpi">
                    <div>Citas Hoy</div>
                    <div class="kpi-value">0</div>
                </div>
                <div class="kpi">
                    <div>Pacientes</div>
                    <div class="kpi-value">2</div>
                </div>
                <div class="kpi">
                    <div>Ingresos</div>
                    <div class="kpi-value">$0</div>
                </div>
                <div class="kpi">
                    <div>Doctores</div>
                    <div class="kpi-value">3</div>
                </div>
            </div>
        </section>

        <section id="pacientes">
            <h2>Pacientes</h2>
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="nombrePaciente" placeholder="Juan Pérez">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="emailPaciente" placeholder="juan@example.com">
            </div>
            <button class="btn" onclick="agregarPaciente()">Agregar</button>
            <table>
                <thead>
                    <tr><th>Nombre</th><th>Email</th></tr>
                </thead>
                <tbody id="tablaPacientes">
                    <tr><td>Juan Pérez</td><td>juan@example.com</td></tr>
                    <tr><td>María López</td><td>maria@example.com</td></tr>
                </tbody>
            </table>
        </section>

        <section id="citas">
            <h2>Citas</h2>
            <p>Sistema de citas en bloque para múltiples doctores</p>
            <div class="form-group">
                <label>Fecha</label>
                <input type="date" id="fechaCita">
            </div>
            <div class="form-group">
                <label>Hora</label>
                <input type="time" id="horaCita">
            </div>
            <button class="btn" onclick="crearCita()">Crear Cita</button>
        </section>

        <section id="reportes">
            <h2>Reportes</h2>
            <table>
                <thead>
                    <tr><th>Métrica</th><th>Valor</th></tr>
                </thead>
                <tbody>
                    <tr><td>Total Citas</td><td>12</td></tr>
                    <tr><td>Pacientes Nuevos</td><td>3</td></tr>
                    <tr><td>Ingresos Totales</td><td>$600</td></tr>
                </tbody>
            </table>
        </section>
    </div>

    <script>
        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function agregarPaciente() { alert('✅ Paciente agregado'); }
        function crearCita() { alert('✅ Cita creada'); }
        function logout() { alert('Sesión cerrada'); window.location.href = '/'; }
    </script>
</body>
</html>
